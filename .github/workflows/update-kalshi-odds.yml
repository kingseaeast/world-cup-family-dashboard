name: Update Kalshi Title Odds

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh Kalshi title odds
        run: npm run update:kalshi-odds

      - name: Commit changes
        run: |
          if git diff --quiet -- data/title-odds.json; then
            echo "No Kalshi odds changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/title-odds.json
          git commit -m "Update Kalshi title odds"
          git push
